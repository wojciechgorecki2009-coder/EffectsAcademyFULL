services:
  - type: web
    name: effects-academy-api
    env: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn production_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: USE_MOCK_DB
        value: "0"
      - key: DB_NAME
        value: effects_academy
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        value: https://effects-academy-web.onrender.com
      - key: CORS_ORIGINS
        value: https://effects-academy-web.onrender.com

  - type: web
    name: effects-academy-web
    env: static
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npm install --legacy-peer-deps ajv@8.20.0 && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://effects-academy-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
